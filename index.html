function elevationGainAt(km){
  if(!ELEVATION_PROFILE.length) return 0;
  if(km<=0) return 0;
  if(km>=ELEVATION_PROFILE[ELEVATION_PROFILE.length-1][0]) return ELEVATION_PROFILE[ELEVATION_PROFILE.length-1][1];
  // binary search for the bracketing pair, then linearly interpolate
  let lo=0, hi=ELEVATION_PROFILE.length-1;
  while(hi-lo>1){
    const mid=(lo+hi)>>1;
    if(ELEVATION_PROFILE[mid][0]<=km) lo=mid; else hi=mid;
  }
  const [km0,g0]=ELEVATION_PROFILE[lo], [km1,g1]=ELEVATION_PROFILE[hi];
  if(km1===km0) return g0;
  const t=(km-km0)/(km1-km0);
  return g0 + t*(g1-g0);
}

      body: JSON.stringify({

    const coords = data.features[0].geometry.coordinates.map(c=>[c[1],c[0]]); // back to [lat,lon]

function haversine(a,b){
  const R=6371;
  const dLat=(b[0]-a[0])*Math.PI/180, dLon=(b[1]-a[1])*Math.PI/180;
  const la1=a[0]*Math.PI/180, la2=b[0]*Math.PI/180;
  const h=Math.sin(dLat/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}

function bearing(a,b){
  const la1=a[0]*Math.PI/180, la2=b[0]*Math.PI/180;
  const dLon=(b[1]-a[1])*Math.PI/180;
  const y=Math.sin(dLon)*Math.cos(la2);
  const x=Math.cos(la1)*Math.sin(la2) - Math.sin(la1)*Math.cos(la2)*Math.cos(dLon);
  return (Math.atan2(y,x)*180/Math.PI + 360) % 360;
}

/* Detect turns from the route's own geometry: no street names or voice guidance (that needs a
   real routing engine), but real bends in a densely-recorded track are real turns on the ground. */
let turnPoints = []; // [{index, cumKm, angle, dir:'left'|'right'|'sharp left'|'sharp right'|'U-turn'}]
function computeTurnPoints(){
  turnPoints = [];
  const MIN_SEG_M = 0.03; // skip near-duplicate points (30m) when computing bearings
  const TURN_THRESHOLD = 25; // degrees
  const MIN_GAP_KM = 0.12; // when turns are closer together than this, keep only the sharpest
  function findBefore(i){
    let j=i-1;
    while(j>0 && haversine(routeCoords[j], routeCoords[i]) < MIN_SEG_M) j--;
    return j;
  }
  function findAfter(i){
    let j=i+1;
    while(j<routeCoords.length-1 && haversine(routeCoords[i], routeCoords[j]) < MIN_SEG_M) j++;
    return j;
  }
  // Pass 1: collect every candidate bend at or above the threshold
  const candidates = [];
  for(let i=1;i<routeCoords.length-1;i++){
    const bi = findBefore(i), ai = findAfter(i);
    if(bi<0 || ai>=routeCoords.length) continue;
    const b1 = bearing(routeCoords[bi], routeCoords[i]);
    const b2 = bearing(routeCoords[i], routeCoords[ai]);
    let diff = b2 - b1;
    while(diff>180) diff-=360;
    while(diff<-180) diff+=360;
    if(Math.abs(diff) >= TURN_THRESHOLD){
      candidates.push({index:i, cumKm:cumDist[i], diff, mag:Math.abs(diff)});
    }
  }
  // Pass 2: non-max suppression -- when candidates are close together, keep only the sharpest
  for(const c of candidates){
    const last = turnPoints[turnPoints.length-1];
    if(last && (c.cumKm - last.cumKm) < MIN_GAP_KM){
      if(c.mag > last.mag){
        turnPoints[turnPoints.length-1] = c; // replace with the sharper bend
      } // else: suppressed, smaller bend right next to a sharper one
    } else {
      turnPoints.push(c);
    }
  }
  // Pass 3: classify direction/label now that the sharpest bend per cluster is chosen
  turnPoints = turnPoints.map(c=>{
    let dir;
    if(c.mag>150) dir='U-turn';
    else if(c.mag>70) dir = c.diff>0 ? 'sharp right' : 'sharp left';
    else dir = c.diff>0 ? 'right' : 'left';
    return {index:c.index, cumKm:c.cumKm, angle:c.mag, dir};
  });
}

function rebuildRoute(){
  cumDist=[0];
  for(let i=1;i<routeCoords.length;i++){
    cumDist.push(cumDist[i-1]+haversine(routeCoords[i-1],routeCoords[i]));
  }
  totalKm = cumDist[cumDist.length-1]||0;
  routeLine.setLatLngs(routeCoords);
  if(routeCoords.length){
    map.fitBounds(routeLine.getBounds(), {padding:[20,20]});
  }
  computeTurnPoints();
  saveState();
}

let lastMatchedIndex = null; // for path continuity on tight loops (see nearestPointIndex)
function nearestPointIndex(latlon){
  let bestD=Infinity, bestI=0;
  for(let i=0;i<routeCoords.length;i++){
    const d=haversine(latlon, routeCoords[i]);
    if(d<bestD){bestD=d;bestI=i;}
  }
  if(lastMatchedIndex===null){
    lastMatchedIndex=bestI;
    return {index:bestI, dist:bestD};
  }
  // On routes that loop close to themselves (e.g. a spur or loop near a town), the raw closest
  // point can be on the WRONG strand of the loop. Among all points nearly as close as the true
  // closest one, prefer whichever keeps continuity with where we were on the route a moment ago.
  const THRESH = bestD + 0.05; // within 50m of the true closest point
  let chosenI=bestI, chosenD=bestD, bestIdxDiff=Math.abs(bestI-lastMatchedIndex);
  for(let i=0;i<routeCoords.length;i++){
    const d=haversine(latlon, routeCoords[i]);
    if(d<=THRESH){
      const idxDiff=Math.abs(i-lastMatchedIndex);
      if(idxDiff<bestIdxDiff){ bestIdxDiff=idxDiff; chosenI=i; chosenD=d; }
    }
  }
  lastMatchedIndex=chosenI;
  return {index:chosenI, dist:chosenD};
}

function degToCompass(deg){
  const dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg/22.5) % 16];
}

function weatherEmoji(code){
  if(code===0) return '☀️';
  if(code===1) return '🌤️';
  if(code===2) return '⛅';
  if(code===3) return '☁️';
  if(code===45||code===48) return '🌫️';
  if([51,53,55,56,57].includes(code)) return '🌦️';
  if([61,63,65,66,67,80,81,82].includes(code)) return '🌧️';
  if([71,73,75,77,85,86].includes(code)) return '❄️';
  if([95,96,99].includes(code)) return '⛈️';
  return '🌡️';
}

async function fetchWeatherNow(lat,lon){
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,precipitation,wind_speed_10m,wind_direction_10m,weather_code&wind_speed_unit=ms&timezone=auto`;
  const res = await fetch(url);
  const data = await res.json();
  const c = data.current;
  return { temp:c.temperature_2m, wind:c.wind_speed_10m, windDir:c.wind_direction_10m, rain:c.precipitation, code:c.weather_code };
}

let lastWeatherFetchTime = 0, lastWeatherFetchKm = -999;
async function maybeRefreshWeather(latlon, rodeKm){
  const now = Date.now();
  const timeOk = (now - lastWeatherFetchTime) > 20*60*1000; // 20 minutes
  const moveOk = Math.abs(rodeKm - lastWeatherFetchKm) > 5; // moved more than 5km
  if(lastWeatherFetchTime!==0 && !timeOk && !moveOk) return;
  lastWeatherFetchTime = now;
  lastWeatherFetchKm = rodeKm;
  refreshWeather(latlon);
}

async function refreshWeather(latlon){
  const badge = document.getElementById('weatherBadge');
  try{
    const w = await fetchWeatherNow(latlon[0], latlon[1]);
    badge.innerHTML = `<span class="wIcon">${weatherEmoji(w.code)}</span><b>${Math.round(w.temp)}°C</b> · ${w.wind.toFixed(1)} m/s ${degToCompass(w.windDir)}`;
  }catch(e){
    badge.innerHTML = `<span class="wIcon">—</span>Weather unavailable`;
  }
}

let currentRodeKm = null; // set only by real position checks, not by exploratory map taps
function updateProgressFromLatLon(latlon){
  const {index, dist} = nearestPointIndex(latlon);
  const rode = cumDist[index]||0;
  updateGuideLine(latlon, routeCoords[index], dist);
  currentRodeKm = rode;
  const remain = Math.max(totalKm - rode, 0);
  const pct = totalKm>0 ? Math.round((rode/totalKm)*100) : 0;
  document.getElementById('statDist').textContent = rode.toFixed(1);
  document.getElementById('statRemain').textContent = remain.toFixed(1);
  document.getElementById('statPct').textContent = pct+'%';

  const climbedSoFar = elevationGainAt(rode);
  const totalClimb = elevationGainAt(totalKm);
  document.getElementById('statClimbed').textContent = Math.round(climbedSoFar);
  document.getElementById('statClimbLeft').textContent = Math.round(Math.max(totalClimb-climbedSoFar,0));

  // Next turn, detected from the route's own geometry (no street names -- see note in controls)
  const turnEl = document.getElementById('nextTurn');
  const turnTextEl = document.getElementById('nextTurnText');
  const nextTurn = turnPoints.find(t => t.cumKm > rode + 0.01);
  if(nextTurn){
    const dKm = nextTurn.cumKm - rode;
    const distText = dKm < 1 ? `${Math.round(dKm*1000)} m` : `${dKm.toFixed(1)} km`;
    const arrow = nextTurn.dir.includes('left') ? '⬅' : nextTurn.dir.includes('right') ? '➡' : '↩';
    const label = nextTurn.dir.charAt(0).toUpperCase()+nextTurn.dir.slice(1);
    turnEl.className = '';
    turnEl.querySelector('.arrow').textContent = arrow;
    turnTextEl.textContent = `${label} in ${distText}`;
  } else {
    turnEl.className = 'dim';
    turnEl.querySelector('.arrow').textContent = '•';
    turnTextEl.textContent = 'No more turns detected ahead';
  }

  maybeRefreshWeather(latlon, rode);
  saveState({lastLat:latlon[0], lastLon:latlon[1]});
}

/* ---------- Position check (one-shot, not continuous -- much easier on battery) ---------- */
const BTN_DEFAULT_LABEL = '📍 Check my position';
function checkPositionOnce(){
  const btn = document.getElementById('btnGPS');
  if(!navigator.geolocation){
    alert('Geolocation not supported on this browser.');
    return;
  }
  btn.textContent = 'Locating…';
  // Safety net: if the browser never calls back (can happen with permission edge cases),
  // don't leave the button stuck forever.
  const safetyTimer = setTimeout(()=>{ btn.textContent = BTN_DEFAULT_LABEL; }, 22000);
  navigator.geolocation.getCurrentPosition(pos=>{
    clearTimeout(safetyTimer);
    const latlon=[pos.coords.latitude,pos.coords.longitude];
    placePositionMarker(latlon,pos.coords.accuracy);
    updateProgressFromLatLon(latlon);
    btn.textContent = BTN_DEFAULT_LABEL;
  }, err=>{
    clearTimeout(safetyTimer);
    btn.textContent = BTN_DEFAULT_LABEL;
    document.getElementById('nextTurnText').textContent = 'GPS error: '+err.message;
  }, {enableHighAccuracy:true, maximumAge:60000, timeout:20000});
}
document.getElementById('btnGPS').addEventListener('click', checkPositionOnce);
// Not auto-run on page load: some browsers won't reliably resolve a location request that
// fires before any tap on the page, which can leave it hanging. Last known position (if any)
// is restored from storage below instead -- tap the button for a fresh fix.

function placePositionMarker(latlon, accuracy){
  if(!posMarker){
    posMarker = L.circleMarker(latlon, {radius:8, color:'#fff', weight:2, fillColor:'#4a90ff', fillOpacity:1}).addTo(map);
    map.setView(latlon, 13);
  } else {
    posMarker.setLatLng(latlon);
  }
  if(accuracy){
    if(!accCircle){
      accCircle = L.circle(latlon,{radius:accuracy, color:'#4a90ff', weight:1, fillOpacity:0.08}).addTo(map);
    } else {
      accCircle.setLatLng(latlon); accCircle.setRadius(accuracy);
    }
  }
}

// Tap the map to check how far a point is from your current position, measured ALONG the
// route (not straight-line) -- doesn't touch your actual tracked position or stats.
function nearestRodeKmSimple(latlon){
  let bestD=Infinity, bestI=0;
  for(let i=0;i<routeCoords.length;i++){
    const d=haversine(latlon, routeCoords[i]);
    if(d<bestD){bestD=d;bestI=i;}
  }
  return {rodeKm:cumDist[bestI]||0, dist:bestD};
}

map.on('click', e=>{
  const latlon=[e.latlng.lat, e.latlng.lng];
  const {rodeKm:tappedKm, dist} = nearestRodeKmSimple(latlon);

  let text;
  if(currentRodeKm===null){
    text = `📍 Tap "Check my position" first to compare distances.`;
  } else {
    const diff = tappedKm - currentRodeKm;
    const absDiff = Math.abs(diff);
    const distText = absDiff < 1 ? `${Math.round(absDiff*1000)} m` : `${absDiff.toFixed(1)} km`;
    text = diff >= 0
      ? `➡ ${distText} ahead of you (along the route)`
      : `⬅ ${distText} behind you (along the route)`;
  }
  if(dist > 0.3){
    text += `<br><span style="color:var(--dim);font-size:11px">(${Math.round(dist*1000)}m from the nearest point on the route)</span>`;
  }
  L.popup().setLatLng(latlon).setContent(text).openOn(map);
});

/* ---------- Reset ---------- */
document.getElementById('btnReset').addEventListener('click', ()=>{
  if(!confirm('Reset saved progress (position and distance)?')) return;
  localStorage.removeItem('bikeTripState');
  lastMatchedIndex = null;
  lastWeatherFetchTime = 0;
  lastWeatherFetchKm = -999;
  campsiteMarkers.forEach(m=>map.removeLayer(m));
  campsiteMarkers=[];
  guideLine.setLatLngs([]);
  rebuildRoute();
});

/* ---------- Persistence (this device only, works fully offline) ---------- */
function saveState(extra){
  try{
    const state = {
      routeIsCustom, routeCoords: routeIsCustom ? routeCoords : null,
      ...(extra||{})
    };
    const prev = JSON.parse(localStorage.getItem('bikeTripState')||'{}');
    localStorage.setItem('bikeTripState', JSON.stringify({...prev, ...state}));
  }catch(e){ /* storage unavailable, ignore */ }
}
function loadState(){
  try{
    const s = JSON.parse(localStorage.getItem('bikeTripState')||'null');
    if(!s) return;
    if(s.routeIsCustom && s.routeCoords){
      routeCoords = s.routeCoords; routeIsCustom = true;
      document.getElementById('routeSrcBadge').textContent = 'Custom GPX (restored)';
    }
    rebuildRoute();
    if(s.lastLat && s.lastLon){
      const latlon=[s.lastLat,s.lastLon];
      placePositionMarker(latlon,null);
      updateProgressFromLatLon(latlon);
    }
  }catch(e){ rebuildRoute(); }
}

loadState();
if(cumDist.length===0) rebuildRoute();
</script>
